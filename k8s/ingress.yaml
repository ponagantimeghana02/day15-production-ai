apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: ai-api-ingress

spec:
  ingressClassName: nginx

  rules:
  - host: ai.local

    http:
      paths:
      - path: /
        pathType: Prefix

        backend:
          service:
            name: ai-api-service

            port:
              number: 80